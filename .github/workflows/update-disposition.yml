name: Update Disposition Dashboard

on:
  schedule:
    # Taipei 17:50 / 18:30 / 19:30 on weekdays — 3 attempts to tolerate
    # GitHub Actions cron drift (commonly 5–60 min).
    - cron: '50 9 * * 1-5'
    - cron: '30 10 * * 1-5'
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate disposition dashboard
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python generate_disposition.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add disposition_index.html disposition_latest.json disposition_data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update disposition dashboard $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi
