name: Update ETF Dashboard

on:
  schedule:
    # Taipei 17:50 / 18:30 / 19:30 on weekdays — 3 attempts to tolerate
    # GitHub Actions cron drift (commonly 5–60 min). If an earlier window
    # already produced a complete snapshot, later runs skip the fetch.
    - cron: '50 9 * * 1-5'
    - cron: '30 10 * * 1-5'
    - cron: '30 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Generate ETF dashboard
        run: python generate_etf.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_index.html etf_latest.json etf_data/ etf_config.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update ETF dashboard $(date -u +%Y-%m-%d)"
            git push
          fi
