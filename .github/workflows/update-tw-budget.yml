name: Update TW Budget Monitor

on:
  schedule:
    # 台灣時間每日 08:30 與 18:30（UTC 00:30 / 10:30）
    - cron: '30 0 * * *'
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate TW budget dashboard
        run: python generate_tw_budget.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tw_budget_index.html tw_budget_latest.json tw_budget_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update TW budget monitor $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi
