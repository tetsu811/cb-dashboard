name: Update AI Strategy Dashboard

on:
  schedule:
    # 美股收盤後執行（22:30 UTC 覆蓋 EDT/EST）
    - cron: '40 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas lxml requests beautifulsoup4

      - name: Restore FMP cache
        uses: actions/cache@v4
        with:
          path: ai_fmp_cache
          key: fmp-cache-${{ github.run_id }}
          restore-keys: |
            fmp-cache-

      - name: Restore LLM news cache
        uses: actions/cache@v4
        with:
          path: ai_llm_cache
          key: llm-cache-${{ github.run_id }}
          restore-keys: |
            llm-cache-

      - name: Generate AI strategy dashboard
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_ai_strategy.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_strategy.html ai_latest.json ai_data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update AI strategy dashboard $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
