name: Update Big Holders Dashboard

on:
  schedule:
    # TDCC 每週五 17:30 左右更新，多跑幾次以確保抓到最新資料；
    # 若當週快照已存在且未改變，腳本會跳過寫入。
    # Taipei 每日 18:00 (UTC 10:00)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Generate big holders dashboard
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python generate_big_holders.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add big_holders_index.html big_holders_latest.json big_holders_data/ stock_names.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update big holders dashboard $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi
